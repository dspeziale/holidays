<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body { font-family: Arial, sans-serif; background: #f4f4f4; margin: 0; padding: 0; }
    .wrapper { max-width: 600px; margin: 30px auto; background: #fff; border-radius: 8px; overflow: hidden; box-shadow: 0 2px 8px rgba(0,0,0,.1); }
    .header  { background: #0f3460; color: #fff; padding: 24px 30px; }
    .header h1 { margin: 0; font-size: 20px; }
    .header p { margin: 4px 0 0; font-size: 13px; opacity: .8; }
    .body    { padding: 30px; color: #333; line-height: 1.6; }
    .footer  { background: #f8f9fa; padding: 16px 30px; font-size: 12px; color: #888; text-align: center; }
    .btn     { display: inline-block; padding: 12px 24px; background: #0d6efd; color: #fff !important; text-decoration: none; border-radius: 6px; margin: 16px 0; }
    .alert-box { background: #fff3cd; border-left: 4px solid #ffc107; padding: 12px 16px; border-radius: 4px; margin: 16px 0; }
    .credentials { background: #f8f9fa; border: 1px solid #dee2e6; border-radius: 6px; padding: 16px; margin: 16px 0; }
    .credentials td { padding: 4px 8px; }
    .credentials .label { color: #6c757d; font-size: 13px; }
    .credentials .value { font-weight: bold; font-family: monospace; }
  </style>
</head>
<body>
  <div class="wrapper">
    <div class="header">
      <h1>Roma Lusso Travel</h1>
      <p>Gestionale interno</p>
    </div>
    <div class="body">{% block email_body %}{% endblock %}</div>
    <div class="footer">
      Questa è un'email automatica, si prega di non rispondere.<br>
      &copy; 2025 Roma Lusso Travel — Tutti i diritti riservati.
    </div>
  </div>
</body>
</html>
